<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIDJON | CYBER HUB</title>
    <style>
        :root { --green: #00ff41; --dark: #000; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: var(--green); font-family: 'Courier New', monospace; overflow-x: hidden; }
        
        /* Matrix orqa foni */
        #matrix { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }

        .container { display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        
        .header { text-align: center; margin-top: 30px; border: 2px solid var(--green); padding: 20px; background: rgba(0,0,0,0.8); box-shadow: 0 0 20px var(--green); width: 90%; max-width: 500px; }
        
        .name-glitch { font-size: 2.5rem; font-weight: bold; letter-spacing: 5px; text-shadow: 2px 2px #f00; animation: glitch 1s infinite; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.7; transform: skew(2deg); } 100% { opacity: 1; } }

        /* Tugmalar bo'limi */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 500px; margin-top: 30px; }
        
        .hack-btn {
            background: rgba(0, 40, 0, 0.6); color: var(--green); border: 1px solid var(--green);
            padding: 20px 10px; cursor: pointer; font-weight: bold; transition: 0.3s;
            text-transform: uppercase; font-size: 0.8rem; text-align: center;
        }

        .hack-btn:hover { background: var(--green); color: #000; box-shadow: 0 0 20px var(--green); transform: scale(1.05); }

        .admin-link {
            margin-top: 40px; border: 2px solid #ff0000; color: #ff0000; padding: 15px 40px;
            text-decoration: none; font-weight: bold; letter-spacing: 2px;
        }
        .admin-link:hover { background: #ff0000; color: #fff; box-shadow: 0 0 25px #ff0000; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        <div class="header">
            <div class="name-glitch">SAIDJON</div>
            <p>[ SYSTEM OVERRIDE ACTIVE ]</p>
        </div>

        <div class="grid-menu">
            <button class="hack-btn" onclick="run('DDoS Hujum boshlandi...')">DDoS ATTACK</button>
            <button class="hack-btn" onclick="run('Baza skanerlanmoqda...')">SQL INJECT</button>
            <button class="hack-btn" onclick="run('Proxy zanjiri ulanmoqda...')">IP SPOOFING</button>
            <button class="hack-btn" onclick="run('WPS PIN aniqlanmoqda...')">WIFI CRACK</button>
            <button class="hack-btn" onclick="run('Kodni shifrlash...')">ENCRYPTION</button>
            <button class="hack-btn" onclick="run('Barcha tizimlar OK!')">SYSTEM CHECK</button>
        </div>

        <a href="https://t.me/saidjon_mc1" class="admin-link">ADMINGA MUROJAT</a>
    </div>

    <script>
        // Matrix Rain
        const c = document.getElementById("matrix");
        const ctx = c.getContext("2d");
        c.width = window.innerWidth; c.height = window.innerHeight;
        const txts = "01010101010101010101010101010101";
        const drops = Array(Math.floor(c.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = "#0f0"; ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                const text = txts[Math.floor(Math.random()*txts.length)];
                ctx.fillText(text, i*16, y*16);
                if(y*16 > c.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);

        function run(msg) {
            alert("COMMAND EXECUTED:\n" + msg);
        }
    </script>
</body>
</html>
