<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>HAKIMJON | INSTA-BYPASS</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .terminal { border: 2px solid #00ff41; padding: 25px; width: 350px; background: rgba(0,20,0,0.9); box-shadow: 0 0 15px #00ff41; border-radius: 8px; }
        h2 { text-align: center; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #00ff41; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #log { font-size: 11px; margin-top: 15px; height: 100px; overflow: hidden; display: none; border-top: 1px solid #333; padding-top: 10px; }
        .error { color: #ff0000; font-weight: bold; text-align: center; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="terminal">
        <h2>HAKIMJON MOD</h2>
        <p style="font-size: 10px; text-align: center;">[ TARGET: INSTAGRAM DATA BYPASS ]</p>
        
        <input type="text" id="target" placeholder="Target Username (@nik)">
        <button class="btn" onclick="hackStart()">PAROLNI ANIQLASH</button>

        <div id="log"></div>
        <div id="err" class="error">XATO: HAKIMJON SIZNI KO'RIB QOLDI! 😂</div>
    </div>

    <script>
        function hackStart() {
            const target = document.getElementById('target').value;
            if(!target) return alert("Nikni yozing!");

            const log = document.getElementById('log');
            const err = document.getElementById('err');
            log.style.display = "block";
            log.innerHTML = "";

            const steps = [
                `> Scanning @${target} account...`,
                "> Bypassing Two-Factor Auth...",
                "> Cracking password hash...",
                "> Data leak detected: 88%",
                "> Accessing private DMs...",
                "> Hakimjon says: 'To'xta uka!'"
            ];

            let i = 0;
            const timer = setInterval(() => {
                if(i < steps.length) {
                    log.innerHTML += `<div>${steps[i]}</div>`;
                    i++;
                } else {
                    clearInterval(timer);
                    setTimeout(() => {
                        log.style.display = "none";
                        err.style.display = "block";
                        alert("HAKIMJON MASLAHATI: Birovning parolini emas, o'zingni ustingda ishlashni o'rgan, uka! 😉");
                    }, 1000);
                }
            }, 800);
        }
    </script>
</body>
</html>
