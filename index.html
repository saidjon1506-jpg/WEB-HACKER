<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB-HACKER Admin Panel</title>
    <style>
        :root { --lime: #cdff00; --bg: #000; --card: #121212; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; }
        
        /* ADMIN PANEL MODAL */
        #admin-auth, #admin-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none; padding: 20px; box-sizing: border-box;
        }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; }
        
        /* UI ELEMENTS */
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .page { padding: 15px; padding-bottom: 100px; display: none; }
        .active { display: block; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #222; position: relative; }
        .btn { background: var(--lime); color: #000; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        
        /* NAVIGATION */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #080808; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #777; cursor: pointer; }
        .nav-item.active-nav { color: var(--lime); }
    </style>
</head>
<body>

<div id="admin-auth">
    <h2>Admin Kirish</h2>
    <input type="password" id="admin-pass" placeholder="Parolni kiriting...">
    <button class="btn" onclick="checkPass()">KIRISH</button>
    <p onclick="closeAdmin()" style="text-align:center; margin-top:20px; color:#888">Yopish</p>
</div>

<div id="admin-panel">
    <h2>Boshqaruv Paneli</h2>
    <p>Yangi bo'lim qo'shish:</p>
    <input type="text" id="new-btn-name" placeholder="Tugma nomi (masalan: Yangi xizmat)">
    <input type="text" id="new-btn-desc" placeholder="Tavsif (masalan: Bu yangi funksiya)">
    <select id="target-page">
        <option value="p-home">Bosh sahifa</option>
        <option value="p-servis">Servislar</option>
    </select>
    <button class="btn" onclick="addNewElement()">QO'SHISH</button>
    <hr>
    <button class="btn" style="background:red; color:white" onclick="closeAdmin()">PANELDAN CHIQISH</button>
</div>

<div class="header">
    <div onclick="openAuth()" style="cursor:pointer">⚙️ Saidjon</div>
    <div id="status" style="color:var(--lime); font-size:12px">Online</div>
</div>

<div id="p-home" class="page active">
    <h3>Asosiy bo'limlar</h3>
    <div id="home-list">
        <div class="card">
            <h4>Hambi SMART</h4>
            <p>Premium obuna yoqilgan</p>
        </div>
    </div>
</div>

<div id="p-servis" class="page">
    <h3>Xizmatlar</h3>
    <div id="servis-list"></div>
</div>

<div class="nav">
    <div class="nav-item active-nav" onclick="nav('p-home', this)">🏠<br>Asosiy</div>
    <div class="nav-item" onclick="nav('p-servis', this)">🔳<br>Servislar</div>
    <div class="nav-item" onclick="openAuth()">🔑<br>Admin</div>
</div>

<script>
    // PAROLNI TEKSHIRISH
    function openAuth() { document.getElementById('admin-auth').style.display = 'block'; }
    function closeAdmin() { 
        document.getElementById('admin-auth').style.display = 'none'; 
        document.getElementById('admin-panel').style.display = 'none'; 
    }

    function checkPass() {
        const pass = document.getElementById('admin-pass').value;
        if(pass === "saidjon978") {
            document.getElementById('admin-auth').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else {
            alert("Xato parol!");
        }
    }

    // YANGI ELEMENT QO'SHISH
    function addNewElement() {
        const name = document.getElementById('new-btn-name').value;
        const desc = document.getElementById('new-btn-desc').value;
        const page = document.getElementById('target-page').value;
        const listId = (page === 'p-home') ? 'home-list' : 'servis-list';

        if(name && desc) {
            const newCard = document.createElement('div');
            newCard.className = 'card';
            newCard.innerHTML = `<h4>${name}</h4><p>${desc}</p><button class="btn" onclick="alert('${name} bosildi')">Ochish</button>`;
            
            document.getElementById(listId).appendChild(newCard);
            
            // Tozalash
            document.getElementById('new-btn-name').value = "";
            document.getElementById('new-btn-desc').value = "";
            alert("Muvaffaqiyatli qo'shildi!");
        }
    }

    // NAVIGATSIYA
    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        el.classList.add('active-nav');
    }
</script>

</body>
</html>
