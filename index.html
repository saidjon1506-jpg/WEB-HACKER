<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REK-HASHTAG 2026 | SAIDJON</title>
    <style>
        :root { --accent: #00d2ff; --bg: #0a0a0c; --card: #16161a; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        header { width: 100%; padding: 30px 0; text-align: center; background: linear-gradient(to bottom, #111, var(--bg)); border-bottom: 1px solid #333; }
        h1 { margin: 0; font-size: 2rem; letter-spacing: 2px; color: var(--accent); }

        .container { width: 90%; max-width: 600px; margin-top: 40px; }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }
        
        .btn { padding: 15px 25px; border-radius: 10px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }

        /* Natijalar */
        #result-area { display: none; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; }
        .hashtag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .tag { background: #222; padding: 8px 12px; border-radius: 5px; font-size: 14px; color: var(--accent); border: 1px solid #333; }
        
        .copy-btn { width: 100%; margin-top: 20px; padding: 10px; background: transparent; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; border-radius: 8px; }
        .copy-btn:hover { background: var(--accent); color: #000; }

        footer { margin-top: auto; padding: 20px; color: #555; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <h1>REK-GEN 2026</h1>
        <p style="color: #888;">Saidjon Ahmadjonov tomonidan maxsus</p>
    </header>

    <div class="container">
        <div class="search-box">
            <input type="text" id="topic" placeholder="Mavzuni yozing (masalan: Mashina, Edit, Food)">
            <button class="btn" onclick="generateTags()">TOPISH</button>
        </div>

        <div id="result-area">
            <h3 style="margin-top:0;">Topilgan Hashtaglar:</h3>
            <div class="hashtag-list" id="tag-container">
                </div>
            <button class="copy-btn" onclick="copyTags()">Nusxa olish</button>
        </div>
    </div>

    <footer>© 2026 SAIDJON DEV | API READY</footer>

    <script>
        const hashDatabase = {
            "edit": ["#edit", "#reels", "#instagram", "#trending", "#viral", "#alightmotion", "#capcut", "#2026", "#explore"],
            "mashina": ["#car", "#speed", "#bmw", "#mercedes", "#uzb", "#auto", "#tuning", "#rek", "#avto"],
            "food": ["#food", "#yummy", "#instafood", "#reelsuzb", "#mazzali", "#ovqat", "#dinner"],
            "pubg": ["#pubg", "#pubgmobile", "#proplayer", "#gaming", "#highlights", "#headshot", "#reksayti"]
        };

        function generateTags() {
            const topic = document.getElementById('topic').value.toLowerCase();
            const container = document.getElementById('tag-container');
            const area = document.getElementById('result-area');
            
            let tags = hashDatabase[topic] || ["#rek", "#top", "#uzbekistan", "#viral", "#trending", "#reels", "#fyp", "#explore"];
            
            container.innerHTML = tags.map(t => `<div class="tag">${t}</div>`).join('');
            area.style.display = 'block';
        }

        function copyTags() {
            const tags = Array.from(document.querySelectorAll('.tag')).map(t => t.innerText).join(' ');
            navigator.clipboard.writeText(tags);
            alert("Hashtaglar nusxalandi!");
        }
    </script>
</body>
</html>
