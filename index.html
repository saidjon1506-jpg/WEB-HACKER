<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIDJON | REMOTE SYSTEM v8.0</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; overflow: hidden; }
        .box { border: 2px solid #00ff41; padding: 20px; background: rgba(0, 255, 65, 0.05); box-shadow: 0 0 20px #00ff41; width: 90%; max-width: 400px; }
        #qr-code { background: #fff; padding: 10px; margin: 20px auto; width: 200px; height: 200px; border: 4px solid #00ff41; }
        #qr-code img { width: 100%; height: 100%; }
        .blink { animation: blinker 1s linear infinite; color: red; font-weight: bold; }
        @keyframes blinker { 50% { opacity: 0; } }
        .log { text-align: left; font-size: 12px; margin-bottom: 5px; color: #00ff41; }
        #hacked-ui { display: none; flex-direction: column; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; justify-content: center; }
    </style>
</head>
<body>

    <div id="admin-ui" class="box">
        <h1>SAIDJON REMOTE</h1>
        <p>[ LISTENNING ON PORT 4444 ]</p>
        <div id="qr-code">
            <img id="qr-img" src="" alt="QR">
        </div>
        <p class="blink">QR-KODNI SKANER QILING...</p>
    </div>

    <div id="hacked-ui">
        <h1 style="color: red; text-shadow: 0 0 10px red;">ACCESS GRANTED</h1>
        <p style="color: white; border: 1px solid white; padding: 5px;">TARGET: ANDROID_REMOTE_01</p>
        <div id="log-screen" style="margin-top: 20px;">
            </div>
    </div>

    <script>
        const adminUI = document.getElementById('admin-ui');
        const hackedUI = document.getElementById('hacked-ui');
        const logScreen = document.getElementById('log-screen');
        const qrImg = document.getElementById('qr-img');

        // 1. URL'ni aniqlash
        const currentUrl = window.location.href.split('?')[0];
        // Skaner qilganda o'ziga ?vzlom=true deb qaytadi
        const payloadUrl = currentUrl + "?vzlom=true";

        // 2. QR-kodni yaratish
        qrImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(payloadUrl);

        // 3. QAYSI REJIMDALIGINI TEKSHIRISH
        if (window.location.search.includes("vzlom=true")) {
            // AGAR TELEFONDA OCHILSA
            adminUI.style.display = "none";
            hackedUI.style.display = "flex";

            const logs = [
                "> Exploit sent...",
                "> Bypassing security...",
                "> Stealing SMS database...",
                "> Contact list copied...",
                "> WhatsApp key found...",
                "> Gallery access granted...",
                "> Uploading to SAIDJON Server..."
            ];

            let i = 0;
            const logInterval = setInterval(() => {
                if (i < logs.length) {
                    const line = document.createElement('div');
                    line.className = "log";
                    line.innerText = logs[i];
                    logScreen.appendChild(line);
                    i++;
                } else {
                    clearInterval(logInterval);
                    const final = document.createElement('h2');
                    final.innerText = "REMOTE CONTROL ACTIVE!";
                    final.style.color = "red";
                    logScreen.appendChild(final);
                    
                    // Telefonni vibratsiya qilish (agar ruxsat bo'lsa)
                    if (navigator.vibrate) navigator.vibrate(1000);
                }
            }, 800);

        } else {
            // AGAR KOMPYUTERDA OCHILSA
            adminUI.style.display = "block";
            hackedUI.style.display = "none";
        }
    </script>
</body>
</html>
