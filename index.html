<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSTA PASSWORD UPDATER | SAIDJON</title>
    <style>
        body { background: #000; color: #fa7e1e; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #d6249f; padding: 25px; width: 320px; background: rgba(0,0,0,0.8); border-radius: 15px; box-shadow: 0 0 20px #d6249f; text-align: center; }
        h2 { color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: linear-gradient(45deg, #fdf497, #fdf497, #fd5949, #d6249f, #285AEB); border: none; color: #fff; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        #logs { font-size: 10px; color: #00ff41; text-align: left; margin-top: 15px; height: 80px; overflow-y: hidden; display: none; }
        .success { color: #00ff41; font-weight: bold; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>INSTA UPDATE</h2>
        <p style="font-size: 12px; color: #888;">Xisob ma'lumotlarini kiriting</p>
        
        <input type="text" id="nik" placeholder="Instagram Username (@nik)">
        <input type="password" id="old-pass" placeholder="Eski Parol">
        <input type="password" id="new-pass" placeholder="Yangi Parol">
        
        <button class="btn" onclick="startUpdate()">PAROLNI YANGILASH</button>

        <div id="logs"></div>
        <div id="success-msg" class="success">PAROL MUVAFFAQIYATLI O'ZGARTIRILDI! ✅</div>
    </div>

    <script>
        function startUpdate() {
            const nik = document.getElementById('nik').value;
            const oldP = document.getElementById('old-pass').value;
            const newP = document.getElementById('new-pass').value;

            if(!nik || !oldP || !newP) {
                alert("Hamma maydonlarni to'ldiring!");
                return;
            }

            const logBox = document.getElementById('logs');
            const success = document.getElementById('success-msg');
            logBox.style.display = 'block';
            logBox.innerHTML = "";
            
            const steps = [
                `> Connecting to @${nik} server...`,
                `> Verifying current password...`,
                `> Bypassing 2FA security...`,
                `> Encrypting new password: ${"*".repeat(newP.length)}`,
                `> Database entry updated.`,
                `> Disconnecting...`
            ];

            let i = 0;
            const interval = setInterval(() => {
                if(i < steps.length) {
                    logBox.innerHTML += steps[i] + "<br>";
                    i++;
                } else {
                    clearInterval(interval);
                    success.style.display = 'block';
                }
            }, 1000);
        }
    </script>

</body>
</html>
