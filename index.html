<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIDJON | PRO PORTAL</title>
    <style>
        :root { --primary: #00ff41; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; margin: 0; padding-bottom: 50px; }
        
        header { background: #000; padding: 25px; text-align: center; border-bottom: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary); }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 15px; transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .card h3 { color: var(--primary); margin: 0 0 10px 0; }
        .card p { font-size: 14px; color: #aaa; margin-bottom: 15px; }
        .card a { color: #000; background: var(--primary); padding: 8px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 13px; }

        #admin-panel { display: none; background: #161616; border: 2px solid var(--primary); padding: 25px; border-radius: 15px; margin-top: 30px; animation: slideIn 0.5s; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--primary); color: #000; }
        .btn-close { background: #444; color: #fff; }
        .btn-del { background: #ff4444; color: #fff; margin-top: 15px; padding: 5px 10px; font-size: 12px; }

        .footer-trigger { opacity: 0.2; text-align: center; margin-top: 100px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<header>
    <h1>SAIDJON FOYDALI PORTAL</h1>
    <div style="font-size: 12px; color: var(--primary);">System Status: Online | Admin: Saidjon</div>
</header>

<div class="container">
    <div class="grid" id="main-grid">
        </div>

    <div id="admin-panel">
        <h2 style="color: var(--primary); margin-top: 0;">🛠 ADMIN BOSHQARUVI</h2>
        <input type="text" id="new-title" placeholder="Bo'lim nomi (Masalan: Yangi Bot)">
        <textarea id="new-desc" placeholder="Tavsif (ixtiyoriy)"></textarea>
        <input type="text" id="new-link" placeholder="Link (ixtiyoriy, masalan: t.me/...)">
        
        <div class="btn-group">
            <button class="btn btn-save" onclick="saveNewSection()">QO'SHISH</button>
            <button class="btn btn-close" onclick="closeAdmin()">YOPISH</button>
        </div>
    </div>

    <div class="footer-trigger" onclick="checkAdmin()">[ ADMIN LOGIN ]</div>
</div>

<script>
    // Parol: saidjon978
    const ADMIN_PASS = "saidjon978";
    let isAdmin = false;

    // Ma'lumotlar bazasi (localStorage)
    let sections = JSON.parse(localStorage.getItem('saidjon_portal_data')) || [
        { title: "Foydali Bot New", desc: "Eng yangi funksiyalar", link: "https://t.me/foydalibot_new" },
        { title: "Foydali UZ Bot", desc: "Yordamchi xizmatlar", link: "https://t.me/FOYDAL1_UZBOT" }
    ];

    function drawPortal() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        
        sections.forEach((item, index) => {
            grid.innerHTML += `
                <div class="card">
                    <h3>${item.title || 'Nomsiz Bo\'lim'}</h3>
                    ${item.desc ? `<p>${item.desc}</p>` : ''}
                    ${item.link ? `<a href="${item.link}" target="_blank">O'TISH</a>` : ''}
                    ${isAdmin ? `<br><button class="btn btn-del" onclick="removeSection(${index})">O'CHIRISH</button>` : ''}
                </div>
            `;
        });
    }

    function checkAdmin() {
        let pass = prompt("Admin parolini kiriting:");
        if (pass === ADMIN_PASS) {
            isAdmin = true;
            document.getElementById('admin-panel').style.display = 'block';
            drawPortal();
            alert("Xush kelibsiz, Saidjon!");
        } else {
            alert("Parol noto'g'ri!");
        }
    }

    function saveNewSection() {
        const t = document.getElementById('new-title').value;
        const d = document.getElementById('new-desc').value;
        const l = document.getElementById('new-link').value;

        // Faqat nomi bo'lsa ham qo'shaveradi (100% to'ldirish shart emas)
        if (t.trim() !== "") {
            sections.push({ title: t, desc: d, link: l });
            localStorage.setItem('saidjon_portal_data', JSON.stringify(sections));
            drawPortal();
            // Tozalash
            document.getElementById('new-title').value = '';
            document.getElementById('new-desc').value = '';
            document.getElementById('new-link').value = '';
        } else {
            alert("Kamida bo'lim nomini yozishingiz kerak!");
        }
    }

    function removeSection(index) {
        if (confirm("Ushbu bo'limni o'chiramizmi?")) {
            sections.splice(index, 1);
            localStorage.setItem('saidjon_portal_data', JSON.stringify(sections));
            drawPortal();
        }
    }

    function closeAdmin() {
        isAdmin = false;
        document.getElementById('admin-panel').style.display = 'none';
        drawPortal();
    }

    // Start
    drawPortal();
</script>

</body>
</html>
