<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIDJON | CYBER PORTAL</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #030303;
            --shadow-color: rgba(0, 255, 65, 0.5);
        }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Space Mono', 'Courier New', monospace;
            overflow-x: hidden;
            height: 100%;
        }

        /* Orqa fondagi Matrix effekti uchun canvas */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.15;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Cyberpunk ramka */
        .terminal-box {
            border: 2px solid var(--neon-green);
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            position: relative;
            box-shadow: 0 0 20px var(--shadow-color), inset 0 0 10px var(--shadow-color);
            max-width: 600px;
            width: 100%;
            border-radius: 5px;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
        }

        .glitch-text {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            position: relative;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 red, -2px 0 blue; }
            5% { text-shadow: -2px 0 red, 2px 0 blue; }
            10% { text-shadow: 2px 0 red, -2px 0 blue; }
            100% { text-shadow: none; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
            border-top: 1px solid var(--neon-green);
            padding-top: 20px;
        }

        .stat-item {
            text-align: left;
            font-size: 0.9rem;
        }

        .stat-label { color: #888; display: block; margin-bottom: 5px; }

        /* Tugmalar dizayni */
        .cyber-btn {
            background: transparent;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 15px 30px;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            margin-top: 10px;
        }

        .cyber-btn:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 30px var(--neon-green);
        }

        .motivation-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 20px 0;
            color: #fff;
        }

        /* Scanline effekti */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 255, 65, 0) 0%, rgba(0, 255, 65, 0.1) 50%, rgba(0, 255, 65, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100%; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>
    <div class="scanline"></div>

    <div class="main-container">
        <div class="terminal-box">
            <div class="glitch-text">SAIDJON</div>
            <p style="color: #888;">[ SYSTEM STATUS: ACTIVE ]</p>
            
            <div class="motivation-text">
                "Dunyoni o'zgartirish uchun avval o'z kodingizni yangilang. Haqiqiy kuch — ma'lumotni boshqarishda."
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">LEVEL</span>
                    <span>ELITE HACKER</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">LOCATION</span>
                    <span>UZBEKISTAN</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">SKILL</span>
                    <span>CYBER SECURITY</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">STATUS</span>
                    <span>ONLINE</span>
                </div>
            </div>

            <a href="https://t.me/saidjon_mc1" class="cyber-btn">ADMINGA MUROJAT</a>
        </div>
    </div>

    <script>
        // Matrix Rain Effekti
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff41";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
