<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOYDALI PORTAL | ADMIN PANEL</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0a0a0c; --card: #16161a; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; }
        
        header { background: #000; padding: 20px; text-align: center; border-bottom: 2px solid var(--primary); }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* Bo'limlar stili */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 12px; position: relative; }
        .card h3 { color: var(--primary); margin-top: 0; }
        .card a { display: inline-block; margin-top: 10px; color: #fff; background: var(--primary); color: #000; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; }

        /* Admin Panel stili */
        #admin-section { display: none; background: #111; border: 2px dashed var(--primary); padding: 20px; border-radius: 15px; margin-top: 30px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .admin-btn { background: #22c55e; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .delete-btn { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        
        .secret-trigger { opacity: 0.1; cursor: pointer; text-align: center; margin-top: 50px; font-size: 10px; }
    </style>
</head>
<body>

<header>
    <h1>FOYDALI PORTAL</h1>
    <p>Saidjon Ahmadjonov loyihasi</p>
</header>

<div class="container">
    <div id="user-view">
        <div class="grid" id="sections-container">
            </div>
    </div>

    <div id="admin-section">
        <h2 style="color: var(--primary);">Admin Paneli</h2>
        <input type="text" id="sec-title" placeholder="Bo'lim nomi (masalan: Yangi Bot)">
        <textarea id="sec-desc" placeholder="Bo'lim haqida qisqacha ma'lumot"></textarea>
        <input type="text" id="sec-link" placeholder="Link (Telegram kanal yoki Bot manzili)">
        <button class="admin-btn" onclick="addSection()">Bo'limni Qo'shish</button>
        <button onclick="toggleAdmin()" style="background:#555; color:white; border:none; padding:10px; border-radius:5px; margin-left:10px; cursor:pointer;">Panelni Yopish</button>
    </div>

    <div class="secret-trigger" onclick="toggleAdmin()">ADMIN KIRISH</div>
</div>

<script>
    // Boshlang'ich bo'limlar (Agar xotira bo'sh bo'lsa)
    const defaultSections = [
        { title: "Foydali Bot New", desc: "Eng yangi va foydali funksiyalar to'plami.", link: "https://t.me/foydalibot_new" },
        { title: "Foydali UZ Bot", desc: "Barcha turdagi yordamchi xizmatlar bitta botda.", link: "https://t.me/FOYDAL1_UZBOT" }
    ];

    // Ma'lumotlarni yuklash
    let mySections = JSON.parse(localStorage.getItem('portalSections')) || defaultSections;

    function renderSections() {
        const container = document.getElementById('sections-container');
        container.innerHTML = '';
        
        mySections.forEach((sec, index) => {
            container.innerHTML += `
                <div class="card">
                    <h3>${sec.title}</h3>
                    <p>${sec.desc}</p>
                    <a href="${sec.link}" target="_blank">Kirish</a>
                    <div class="admin-only" style="display: ${adminVisible ? 'block' : 'none'}">
                        <button class="delete-btn" onclick="deleteSection(${index})">O'chirish</button>
                    </div>
                </div>
            `;
        });
    }

    let adminVisible = false;
    function toggleAdmin() {
        adminVisible = !adminVisible;
        document.getElementById('admin-section').style.display = adminVisible ? 'block' : 'none';
        renderSections();
    }

    function addSection() {
        const title = document.getElementById('sec-title').value;
        const desc = document.getElementById('sec-desc').value;
        const link = document.getElementById('sec-link').value;

        if(title && desc && link) {
            mySections.push({ title, desc, link });
            localStorage.setItem('portalSections', JSON.stringify(mySections));
            renderSections();
            // Formani tozalash
            document.getElementById('sec-title').value = '';
            document.getElementById('sec-desc').value = '';
            document.getElementById('sec-link').value = '';
        } else {
            alert("Hamma maydonni to'ldiring!");
        }
    }

    function deleteSection(index) {
        if(confirm("Ushbu bo'limni o'chirib tashlamoqchimisiz?")) {
            mySections.splice(index, 1);
            localStorage.setItem('portalSections', JSON.stringify(mySections));
            renderSections();
        }
    }

    // Birinchi marta yuklash
    renderSections();
</script>

</body>
</html>
