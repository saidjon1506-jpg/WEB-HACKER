<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIDJON | FOYDALI SAYT</title>
    <style>
        :root {
            --neon-green: #00ff00;
            --bg-dark: #0a0a0a;
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--neon-green);
            width: 100%;
            max-width: 500px;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* Statistika */
        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 450px;
        }

        .stat-box {
            background: var(--card-bg);
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #333;
        }

        .stat-box span { color: var(--neon-green); font-weight: bold; }

        /* Tugmalar (Kartochkalar) */
        #content-area {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--neon-green); }

        .card img { width: 100%; height: auto; display: block; }

        .card-body { padding: 15px; }

        .card-body h3 { color: var(--neon-green); margin: 0 0 10px; text-transform: uppercase; }

        .card-body p { font-size: 14px; color: #ccc; margin-bottom: 15px; }

        .btn-more {
            background: var(--neon-green);
            color: black;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>

    <header>
        <h1>FOYDALI SAYT</h1>
        <div style="color:var(--neon-green); font-size:14px;">Dev: @saidjon_mc1</div>
    </header>

    <div class="stats">
        <div class="stat-box">Tashriflar: <span id="view-count">Loading...</span></div>
        <div class="stat-box">Onlayn: <span id="online-count">12</span></div>
    </div>

    <div id="content-area">

        <div class="card">
            <img src="https://via.placeholder.com/400x200/000/00ff00?text=MOD+APK" alt="Rasm">
            <div class="card-body">
                <h3>BIZNING KANAL</h3>
                <p>MOD ILOVALAR BARI TEKIN REKLAMALARSIZ VA XAVFSIZ</p>
                <a href="https://t.me/your_link" class="btn-more">BATAFSIL</a>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/400x200/000/00ff00?text=SMM+BOT" alt="Rasm">
            <div class="card-body">
                <h3>SMM XIZMATLARI</h3>
                <p>Instagram va Telegram uchun eng arzon nakrutka botimiz.</p>
                <a href="https://t.me/NAKRUTKATOPSMMBOT" class="btn-more">BOTGA KIRISH</a>
            </div>
        </div>

    </div>

    <script>
        // Oddiy statistika simulyatsiyasi
        document.getElementById('view-count').innerText = Math.floor(Math.random() * 500) + 1000;
        
        setInterval(() => {
            let online = Math.floor(Math.random() * 15) + 5;
            document.getElementById('online-count').innerText = online;
        }, 3000);
    </script>
</body>
</html>
