<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIDJON GAMES | 50+ ONLINE GAMES</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; }
        body { background: var(--bg); color: var(--neon); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; }
        
        header { padding: 20px; border-bottom: 2px solid var(--neon); background: #000; position: sticky; top: 0; z-index: 100; }
        h1 { margin: 0; letter-spacing: 5px; font-size: 1.5rem; }

        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        
        .game-card {
            background: #151515; border: 1px solid #333; border-radius: 10px;
            padding: 15px; cursor: pointer; transition: 0.3s;
        }
        .game-card:hover { border-color: var(--neon); transform: scale(1.05); box-shadow: 0 0 15px var(--neon); }
        .game-card img { width: 100%; border-radius: 5px; margin-bottom: 10px; }
        .game-card span { font-weight: bold; font-size: 0.9rem; display: block; }

        /* O'yin oynasi (Full Screen) */
        #game-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column; z-index: 1000;
        }
        .close-btn { background: #ff3333; color: white; padding: 10px; cursor: pointer; font-weight: bold; text-align: center; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header>
    <h1>SAIDJON GAMES</h1>
    <p>50 ta TOP o'yinlar to'plami</p>
</header>

<div class="game-grid" id="gameGrid">
    </div>

<div id="game-overlay">
    <div class="close-btn" onclick="closeGame()">O'YINNI YOPISH [X]</div>
    <iframe id="gameFrame" src=""></iframe>
</div>

<script>
    // Mashhur bepul HTML5 o'yinlar ro'yxati (namuna)
    // Manba sifatida bepul ochiq platformalardan foydalanamiz
    const games = [
        { name: "Snake Retro", url: "https://www.google.com/logos/2010/pacman10-i.html" },
        { name: "Tetris Elite", url: "https://tetris.com/play-tetris" },
        { name: "Flappy Bird", url: "https://flappybird.io/" },
        { name: "2048 Cyber", url: "https://2048game.com/" },
        { name: "Dino Run", url: "https://chromedino.com/" },
        { name: "Cyber Racing", url: "https://www.google.com/logos/2010/pacman10-i.html" },
        { name: "Space Invaders", url: "https://freeinvaders.org/" },
        { name: "Minecraft 2D", url: "https://classic.minecraft.net/" },
        { name: "Tic Tac Toe", url: "https://playtictactoe.org/" },
        { name: "Sudoku Pro", url: "https://sudoku.com/" }
        // ... bu ro'yxatni 50 tagacha davom ettiramiz
    ];

    // 50 tagacha to'ldirish uchun takrorlash (namuna uchun)
    for(let i = 11; i <= 50; i++) {
        games.push({ name: "Hacker Game #" + i, url: "https://m.gamey.com/" });
    }

    const grid = document.getElementById('gameGrid');

    games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
            <div style="font-size: 40px; margin-bottom:10px;">🎮</div>
            <span>${game.name}</span>
        `;
        card.onclick = () => openGame(game.url);
        grid.appendChild(card);
    });

    function openGame(url) {
        document.getElementById('gameFrame').src = url;
        document.getElementById('game-overlay').style.display = 'flex';
    }

    function closeGame() {
        document.getElementById('game-overlay').style.display = 'none';
        document.getElementById('gameFrame').src = '';
    }
</script>

</body>
</html>
