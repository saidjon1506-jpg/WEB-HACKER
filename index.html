<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIGINAL DINO | HAKIMJON MOD</title>
    <style>
        body { margin: 0; background: #f7f7f7; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-box { position: relative; width: 600px; height: 150px; background: #fff; border-bottom: 2px solid #535353; overflow: hidden; }
        
        /* Dino Sprite */
        #dino { position: absolute; bottom: 0; left: 50px; width: 44px; height: 47px; 
                background: url('https://raw.githubusercontent.com/wayou/t-rex-runner/master/assets/default_100_percent/100-offline-sprite.png') -76px -2px; 
                background-size: 600px; }
        
        /* Kaktus Sprite */
        .cactus { position: absolute; bottom: 0; width: 25px; height: 50px; 
                  background: url('https://raw.githubusercontent.com/wayou/t-rex-runner/master/assets/default_100_percent/100-offline-sprite.png') -228px -2px; 
                  background-size: 600px; }
        
        #score { position: absolute; top: 10px; right: 20px; font-size: 20px; color: #535353; font-weight: bold; }
        .h-mod { margin-top: 15px; color: #00ff41; background: #000; padding: 10px; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body onclick="jump()" onkeydown="if(event.code=='Space') jump()">

    <h2 style="color: #535353;">HAKIMJON HACKED ORIGINAL DINO</h2>
    
    <div id="game-box">
        <div id="score">00000</div>
        <div id="dino"></div>
    </div>

    <div class="h-mod">STATUS: IMMORTAL (O'LMAYDIGAN) ✅</div>
    <p style="font-size: 12px; color: #888; margin-top: 10px;">Motivatsiya: "Kaktus Hakimjondan qo'rqadi!"</p>

    <script>
        const dino = document.getElementById("dino");
        const gameBox = document.getElementById("game-box");
        const scoreDisplay = document.getElementById("score");

        let isJumping = false;
        let score = 0;

        // Sakrash funksiyasi
        function jump() {
            if (isJumping) return;
            isJumping = true;
            let pos = 0;
            // Sakrash animatsiyasi
            let up = setInterval(() => {
                if (pos >= 100) {
                    clearInterval(up);
                    let down = setInterval(() => {
                        if (pos <= 0) {
                            clearInterval(down);
                            isJumping = false;
                        }
                        pos -= 4;
                        dino.style.bottom = pos + "px";
                    }, 15);
                }
                pos += 4;
                dino.style.bottom = pos + "px";
            }, 15);
        }

        // Kaktuslarni yaratish
        function spawnCactus() {
            const cactus = document.createElement("div");
            cactus.classList.add("cactus");
            let cactusPos = 600;
            cactus.style.left = cactusPos + "px";
            gameBox.appendChild(cactus);

            let move = setInterval(() => {
                if (cactusPos < -30) {
                    clearInterval(move);
                    gameBox.removeChild(cactus);
                }
                cactusPos -= 6;
                cactus.style.left = cactusPos + "px";

                // VZLOM: To'qnashuv tekshiruvi yo'q!
            }, 10);

            // Keyingi kaktus chiqish vaqti
            setTimeout(spawnCactus, Math.random() * 2000 + 800);
        }

        // Ballarni hisoblash
        setInterval(() => {
            score++;
            scoreDisplay.innerText = score.toString().padStart(5, '0');
        }, 100);

        // O'yinni boshlash
        spawnCactus();
    </script>
</body>
</html>
