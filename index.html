<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HACKED DINO - SAIDJON</title>
    <style>
        body { background: #f7f7f7; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #game-container { width: 600px; height: 150px; background: #fff; border-bottom: 2px solid #535353; overflow: hidden; position: relative; }
        #dino { width: 40px; height: 44px; position: absolute; bottom: 0; left: 50px; background: url('https://www.google.com/logos/2010/pacman10-i.html') -0px -0px; /* Almashtiriladi */ }
        .cactus { width: 20px; height: 40px; background: #535353; position: absolute; bottom: 0; }
        #score { position: absolute; top: 10px; right: 20px; font-size: 20px; color: #535353; }
        .hacker-info { margin-top: 20px; color: #00ff41; background: #000; padding: 10px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>SAIDJON VZLOG DINO</h1>
    <div id="game-container">
        <div id="score">00000</div>
        <canvas id="dinoGame" width="600" height="150"></canvas>
    </div>
    <div class="hacker-info">IMMORTAL MODE: ON (Kaktuslardan o'tib ketaveradi)</div>

    <script>
        // Dinozavr o'yini logikasi (Soddalashtirilgan va Vzlom qilingan)
        const canvas = document.getElementById('dinoGame');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let gameSpeed = 5;
        let isJumping = false;
        let dinoY = 130;
        let gravity = 0.6;
        let jumpPower = -12;
        let velocityY = 0;

        let obstacles = [];

        // Sakrashni boshqarish
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && dinoY === 130) {
                velocityY = jumpPower;
                isJumping = true;
            }
        });

        function spawnObstacle() {
            if (Math.random() < 0.02) {
                obstacles.push({ x: 600, width: 20, height: 30 + Math.random() * 20 });
            }
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dinozavr fizikasi
            velocityY += gravity;
            dinoY += velocityY;
            if (dinoY > 130) {
                dinoY = 130;
                velocityY = 0;
            }

            // Dinozavrni chizish
            ctx.fillStyle = '#535353';
            ctx.fillRect(50, dinoY - 40, 40, 40);

            // To'siqlar (Kaktuslar)
            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].x -= gameSpeed;
                ctx.fillStyle = '#ff3333'; // Kaktuslar qizil
                ctx.fillRect(obstacles[i].x, 150 - obstacles[i].height, obstacles[i].width, obstacles[i].height);

                // --- VZLOM QISMI SHU YERDA ---
                // Odatda bu yerda urilish (Collision) tekshiriladi va o'yin to'xtatiladi.
                // Biz esa "GameOver" funksiyasini shunchaki yozmaymiz! 
                // Dinozavr kaktus ichidan o'tib ketaveradi.
                // -----------------------------

                if (obstacles[i].x < -20) {
                    obstacles.splice(i, 1);
                    i--;
                }
            }

            score++;
            document.getElementById('score').innerText = Math.floor(score / 5);
            gameSpeed += 0.001;

            spawnObstacle();
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
