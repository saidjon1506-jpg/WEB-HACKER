<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIDJON | PEGASUS REMOTE v7.0</title>
    <style>
        :root { --neon: #00ff41; --bg: #000; --red: #ff0000; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
        
        /* Admin paneli (Kompyuter uchun) */
        #admin-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        /* QR kod dizayni */
        #qr-box { background: #fff; padding: 15px; border: 4px solid var(--neon); box-shadow: 0 0 30px var(--neon); margin: 20px; cursor: pointer; }
        
        /* Payload (Telefon uchun) */
        #payload-screen { display: none; padding: 20px; background: #000; height: 100vh; flex-direction: column; justify-content: center; }

        .log { font-size: 0.8rem; margin-bottom: 5px; opacity: 0.8; }
        .blink { animation: blinker 1s linear infinite; color: var(--red); font-weight: bold; }
        @keyframes blinker { 50% { opacity: 0; } }

        .btn { border: 1px solid var(--neon); background: transparent; color: var(--neon); padding: 10px 20px; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .btn:hover { background: var(--neon); color: #000; }

        #success-msg { display: none; color: var(--red); font-size: 1.5rem; text-align: center; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <h1 style="letter-spacing: 5px;">PEGASUS REMOTE PRO</h1>
        <p>[ SERVER: RUNNING | ENCRYPTION: SHA-512 ]</p>
        
        <div id="qr-box">
            <img id="qr-image" src="" alt="Skaner qiling">
        </div>

        <p class="blink">WAITING FOR TARGET SCAN...</p>
        <p style="font-size: 0.7rem; color: #444;">ID: 99x-SAIDJON-EXPLOIT</p>
    </div>

    <div id="payload-screen">
        <h2 style="color: var(--red);">SYSTEM COMPROMISED</h2>
        <div id="logs-area">
            <div class="log">> Bypassing Android Firewall...</div>
            <div class="log">> Extracting Google Tokens...</div>
        </div>
        <div id="success-msg">ACCESS GRANTED! <br> [ REMOTE CONTROL ACTIVE ]</div>
    </div>

    <script>
        const adminPanel = document.getElementById('admin-panel');
        const payloadScreen = document.getElementById('payload-screen');
        const logsArea = document.getElementById('logs-area');
        const successMsg = document.getElementById('success-msg');
        const qrImage = document.getElementById('qr-image');

        // Sayt manzilini olish
        const currentUrl = window.location.href.split('?')[0];
        const connectUrl = currentUrl + "?target=connected";

        // QR kodni yaratish
        qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(connectUrl)}`;

        // Agar URL'da "target=connected" bo'lsa, demak telefon skaner qilgan
        if (window.location.search.includes("target=connected")) {
            adminPanel.style.display = "none";
            payloadScreen.style.display = "flex";

            // Xakerlik animatsiyasi
            const lines = [
                "> Accessing Internal Storage...",
                "> Downloading SMS Database...",
                "> Dumping WhatsApp History...",
                "> Stealing Contact List...",
                "> Injecting Backdoor.exe...",
                "> Root Access: OK",
                "> Setting up screen mirroring..."
            ];

            let i = 0;
            const interval = setInterval(() => {
                if (i < lines.length) {
                    const div = document.createElement('div');
                    div.className = "log";
                    div.innerText = lines[i];
                    logsArea.appendChild(div);
                    i++;
                } else {
                    clearInterval(interval);
                    logsArea.style.display = "none";
                    successMsg.style.display = "block";
                    // Do'stingni daxshatga tushirish uchun vibratsiya (agar qo'llasa)
                    if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
                }
            }, 1000);
        }
    </script>
</body>
</html>
