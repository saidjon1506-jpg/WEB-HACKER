<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIDJON | FOYDALI SAYT</title>
    <style>
        :root {
            --neon-green: #00ff00;
            --bg-dark: #0a0a0a;
            --card-bg: #1a1a1a;
            --input-bg: #262626;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--neon-green);
            width: 100%;
            max-width: 500px;
            padding-bottom: 10px;
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.2);
        }

        h1 { margin: 0; font-size: 24px; letter-spacing: 2px; }
        .dev-tag { color: var(--neon-green); font-size: 14px; margin-top: 5px; }

        /* Admin Panel Stili */
        #admin-panel {
            display: none; /* Default yopiq */
            background: var(--card-bg);
            border: 2px solid var(--neon-green);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .panel-title {
            color: var(--neon-green);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        input, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #444;
            color: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-save {
            background: var(--neon-green);
            color: black;
            font-weight: bold;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-close {
            background: #333;
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
        }

        /* Kontent Qismi */
        #content-area {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .card img { width: 100%; height: auto; display: block; }

        .card-body { padding: 15px; }

        .card-body h3 { color: var(--neon-green); margin: 0 0 10px 0; text-transform: uppercase; }

        .card-body p { font-size: 14px; color: #ccc; line-height: 1.5; }

        .btn-more {
            background: var(--neon-green);
            color: black;
            text-decoration: none;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            margin-top: 10px;
        }

        .admin-trigger {
            margin-top: 40px;
            color: var(--neon-green);
            cursor: pointer;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>FOYDALI SAYT</h1>
        <div class="dev-tag">Dev: @saidjon_mc1</div>
    </header>

    <div id="admin-panel">
        <div class="panel-title"><span>+</span> YANGI BO'LIM QO'SHISH</div>
        <input type="text" id="img-url" placeholder="Rasm URL manzili (masalan: https://...)">
        <input type="text" id="title" placeholder="Sarlavha">
        <textarea id="desc" rows="3" placeholder="Tavsif yozing..."></textarea>
        <input type="text" id="link" placeholder="Tugma uchun link (t.me/...)">
        <button class="btn-save" onclick="addSection()">SAQLASH VA QO'SHISH</button>
        <button class="btn-close" onclick="toggleAdmin()">PANELNI YOPISH</button>
    </div>

    <div id="content-area">
        <div class="card">
            <img src="https://via.placeholder.com/400x250/000/00ff00?text=MOD+APK" alt="Post rasm">
            <div class="card-body">
                <h3>BIZNING KANAL</h3>
                <p>MOD ILOVALAR BARI TEKN REKLAMALARSIZ XAVFSIZ VIRUSLARSIZ</p>
                <a href="#" class="btn-more">BATAFSIL</a>
            </div>
        </div>
    </div>

    <div class="admin-trigger" onclick="checkPassword()">[ ADMIN PANELGA KIRISH ]</div>

    <script>
        // Parolni tekshirish
        function checkPassword() {
            let pass = prompt("Parolni kiriting:");
            if (pass === "saidjon978") {
                document.getElementById('admin-panel').style.display = 'block';
                window.scrollTo(0, 0);
            } else {
                alert("Xato! Siz admin emassiz.");
            }
        }

        // Panelni yopish
        function toggleAdmin() {
            document.getElementById('admin-panel').style.display = 'none';
        }

        // Yangi bo'lim qo'shish
        function addSection() {
            const img = document.getElementById('img-url').value;
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            const link = document.getElementById('link').value;

            if (!title || !desc) {
                alert("Sarlavha va tavsifni to'ldiring!");
                return;
            }

            const contentArea = document.getElementById('content-area');
            
            const newCard = document.createElement('div');
            newCard.className = 'card';
            newCard.innerHTML = `
                <img src="${img ? img : 'https://via.placeholder.com/400x250'}" alt="Rasm">
                <div class="card-body">
                    <h3>${title}</h3>
                    <p>${desc}</p>
                    <a href="${link}" class="btn-more">BATAFSIL</a>
                </div>
            `;

            contentArea.prepend(newCard); // Yangisini tepaga qo'shish
            
            // Tozalash
            document.getElementById('img-url').value = '';
            document.getElementById('title').value = '';
            document.getElementById('desc').value = '';
            document.getElementById('link').value = '';
            
            alert("Muvaffaqiyatli qo'shildi!");
        }
    </script>
</body>
</html>
