<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIDJON | EDU-PORTAL</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        
        header { background: #000; border-bottom: 2px solid var(--neon); padding: 25px; text-align: center; box-shadow: 0 0 25px var(--neon); }
        h1 { margin: 0; color: var(--neon); letter-spacing: 3px; font-size: 1.8rem; text-transform: uppercase; }
        .admin-tag { font-size: 12px; color: #888; margin-top: 5px; }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        
        .section-title { border-left: 5px solid var(--neon); padding-left: 15px; margin: 30px 0 20px; font-weight: bold; font-size: 1.2rem; }

        /* Sinf Tanlash */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; }
        .class-card { background: #111; border: 1px solid #333; padding: 20px; text-align: center; cursor: pointer; border-radius: 10px; transition: 0.3s; font-size: 1.1rem; }
        .class-card:hover { border-color: var(--neon); transform: scale(1.05); box-shadow: 0 0 15px var(--neon); }
        .class-card.active { border-color: var(--neon); background: var(--neon); color: #000; font-weight: bold; }

        /* Fanlar Bo'limi */
        #subjects-panel { display: none; margin-top: 30px; background: #0a0a0a; border: 1px solid var(--neon); border-radius: 15px; padding: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .sub-list { list-style: none; padding: 0; }
        .sub-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; transition: 0.2s; }
        .sub-item:hover { background: rgba(0, 255, 65, 0.05); }
        .sub-item a { color: #fff; text-decoration: none; font-size: 1rem; }
        .sub-item span { color: var(--neon); font-size: 0.8rem; border: 1px solid var(--neon); padding: 2px 8px; border-radius: 5px; }

        .motto-box { background: #111; padding: 20px; border-radius: 10px; margin-top: 40px; border: 1px dotted #444; }
    </style>
</head>
<body>

    <header>
        <h1>SAIDJON ACADEMY</h1>
        <div class="admin-tag">Founder: Saidjon Ahmadjonov</div>
    </header>

    <div class="container">
        <div class="section-title">SINFNI TANLANG:</div>
        <div class="grid" id="class-grid">
            </div>

        <div id="subjects-panel">
            <h2 id="class-title" style="color: var(--neon); border-bottom: 1px solid #333; padding-bottom: 10px;"></h2>
            <div class="sub-list" id="list-container">
                </div>
        </div>

        <div class="motto-box">
            <h3 style="color: var(--neon); margin-top: 0;">Saidjon's Motivation:</h3>
            <p style="font-style: italic; color: #ccc;">"Bilim olishdan to'xtama, uka. Bugungi qiyinchilik — ertangi muvaffaqiyating poydevori!"</p>
        </div>
    </div>

    <script>
        // Sinflarni yaratish
        const grid = document.getElementById('class-grid');
        for(let i=1; i<=11; i++) {
            let div = document.createElement('div');
            div.className = 'class-card';
            div.innerText = i + '-Sinf';
            div.onclick = () => loadSubjects(i, div);
            grid.appendChild(div);
        }

        const subjects = {
            8: ["Algebra", "Geometriya", "Fizika", "Adabiyot", "Informatika", "Ingliz tili"],
            9: ["Algebra", "Kimyo", "Biologiya", "Tarix", "Geografiya"],
            // Boshqa sinflar uchun fanlar ro'yxati
        };

        function loadSubjects(num, element) {
            document.querySelectorAll('.class-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');

            const panel = document.getElementById('subjects-panel');
            const list = document.getElementById('list-container');
            const title = document.getElementById('class-title');

            panel.style.display = 'block';
            title.innerText = num + "-Sinf Fanlari";
            
            let data = subjects[num] || ["Matematika", "Ona tili", "Ingliz tili", "Tabiat"];
            
            list.innerHTML = data.map(s => `
                <div class="sub-item">
                    <a href="#">${s} darslik javoblari</a>
                    <span>TEZ KUNDA</span>
                </div>
            `).join('');

            panel.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
