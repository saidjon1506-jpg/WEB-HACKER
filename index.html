<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIDJON | ELITE HACKER</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; height: 100%; }
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .ui-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 2px solid #00ff41; padding: 40px; background: rgba(0,0,0,0.8);
            box-shadow: 0 0 30px #00ff41; text-align: center; width: 80%; max-width: 500px;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
        }
        .name { font-size: 3rem; font-weight: bold; letter-spacing: 10px; margin-bottom: 20px; text-shadow: 3px 3px #ff0000, -3px -3px #0000ff; }
        .quote { color: #fff; font-size: 1.1rem; margin-bottom: 30px; line-height: 1.5; }
        .btn {
            border: 2px solid #ff3333; color: #ff3333; padding: 10px 30px;
            text-decoration: none; font-weight: bold; transition: 0.3s; display: inline-block;
        }
        .btn:hover { background: #ff3333; color: #fff; box-shadow: 0 0 20px #ff3333; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="ui-box">
        <div class="name">SAIDJON</div>
        <div class="quote">"Tizimlar o'zgarmaydi, ularni biz o'zgartiramiz. Bilim — bu eng oliy hokimiyatdir."</div>
        <a href="https://t.me/saidjon_mc1" class="btn">ADMINGA MUROJAT</a>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const fontSize = 16; const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
