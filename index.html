<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMMORTAL DINO | SAIDJON</title>
    <style>
        body { margin: 0; padding: 0; background: #f7f7f7; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; }
        #game { position: relative; width: 600px; height: 200px; background: #fff; border-bottom: 2px solid #535353; overflow: hidden; }
        #dino { position: absolute; bottom: 0; left: 50px; width: 40px; height: 40px; background: #535353; border-radius: 5px; transition: bottom 0.1s; }
        .cactus { position: absolute; bottom: 0; width: 20px; height: 40px; background: #ff0000; border-radius: 3px; }
        #score { position: absolute; top: 10px; right: 20px; font-size: 20px; color: #535353; font-weight: bold; }
        .hack-status { margin-top: 20px; color: #00ff00; background: #000; padding: 10px; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body onclick="jump()" onkeydown="if(event.code=='Space') jump()">

    <h1>SAIDJON HACKED DINO</h1>
    
    <div id="game">
        <div id="score">SCORE: 0</div>
        <div id="dino"></div>
    </div>

    <div class="hack-status">STATUS: SHARPA REJIMI (TO'QNASHUV O'CHIRILGAN) 👻</div>

    <script>
        const dino = document.getElementById("dino");
        const game = document.getElementById("game");
        const scoreDisplay = document.getElementById("score");

        let isJumping = false;
        let score = 0;

        // Sakrash funksiyasi
        function jump() {
            if (isJumping) return;
            isJumping = true;
            let pos = 0;
            let up = setInterval(() => {
                if (pos >= 120) {
                    clearInterval(up);
                    let down = setInterval(() => {
                        if (pos <= 0) {
                            clearInterval(down);
                            isJumping = false;
                        }
                        pos -= 5;
                        dino.style.bottom = pos + "px";
                    }, 20);
                }
                pos += 8;
                dino.style.bottom = pos + "px";
            }, 20);
        }

        // Kaktuslarni yaratish va harakatlantirish
        function createCactus() {
            const cactus = document.createElement("div");
            cactus.classList.add("cactus");
            let cactusPos = 600;
            cactus.style.left = cactusPos + "px";
            game.appendChild(cactus);

            let moveCactus = setInterval(() => {
                if (cactusPos < -20) {
                    clearInterval(moveCactus);
                    game.removeChild(cactus);
                }
                cactusPos -= 8;
                cactus.style.left = cactusPos + "px";

                // --- DIQQAT: BU YERDA URILISHNI TEKSHIRADIGAN KOD YO'Q! ---
                // Shuning uchun dinozavr kaktusga tegsa ham hech narsa bo'lmaydi.
            }, 20);

            // Keyingi kaktus chiqish vaqti
            setTimeout(createCactus, Math.random() * 2000 + 800);
        }

        // Ballarni hisoblash
        setInterval(() => {
            score++;
            scoreDisplay.innerText = "SCORE: " + score;
        }, 100);

        // O'yinni boshlash
        createCactus();
    </script>
</body>
</html>
