<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIDJON | O'LMAS DINO</title>
    <style>
        body { margin: 0; background: #202124; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #world { position: relative; width: 600px; height: 150px; background: #fff; border-bottom: 2px solid #535353; }
        #dino { position: absolute; bottom: 0; left: 40px; width: 40px; height: 40px; background: url('https://raw.githubusercontent.com/wayou/t-rex-runner/master/assets/default_100_percent/100-offline-sprite.png') -76px -2px; background-size: 600px; }
        .cactus { position: absolute; bottom: 0; width: 20px; height: 40px; background: #535353; }
        #score { position: absolute; top: 10px; right: 20px; color: #535353; font-weight: bold; font-size: 20px; }
        .status { margin-top: 20px; color: #00ff41; border: 1px solid #00ff41; padding: 10px; font-weight: bold; }
    </style>
</head>
<body onclick="jump()" onkeydown="if(event.code=='Space') jump()">

    <h1>SAIDJON DINO HACK</h1>
    <div id="world">
        <div id="score">00000</div>
        <div id="dino"></div>
    </div>
    <div class="status">HACK ACTIVE: IMMORTAL (O'LMASLIK YOQILGAN)</div>

    <script>
        const dino = document.getElementById("dino");
        const world = document.getElementById("world");
        const scoreBox = document.getElementById("score");

        let score = 0;
        let isJumping = false;

        // Sakrash
        function jump() {
            if (isJumping) return;
            isJumping = true;
            let up = 0;
            let timer = setInterval(() => {
                if (up >= 100) {
                    clearInterval(timer);
                    let down = setInterval(() => {
                        if (up <= 0) {
                            clearInterval(down);
                            isJumping = false;
                        }
                        up -= 4;
                        dino.style.bottom = up + "px";
                    }, 15);
                }
                up += 4;
                dino.style.bottom = up + "px";
            }, 15);
        }

        // Kaktus yaratish
        function createCactus() {
            const cactus = document.createElement("div");
            cactus.className = "cactus";
            let cactusX = 600;
            cactus.style.left = cactusX + "px";
            world.appendChild(cactus);

            let move = setInterval(() => {
                cactusX -= 6;
                cactus.style.left = cactusX + "px";

                // --- VZLOM SHU YERDA ---
                // Bu yerda "if(dinoX == cactusX)" degan kod yo'q!
                // Dinozavr kaktusni "sezmaydi" va o'lmaydi.
                
                if (cactusX < -20) {
                    clearInterval(move);
                    world.removeChild(cactus);
                }
            }, 10);
            
            setTimeout(createCactus, Math.random() * 2000 + 1000);
        }

        // Ball yig'ish
        setInterval(() => {
            score++;
            scoreBox.innerText = score.toString().padStart(5, '0');
        }, 100);

        createCactus();
    </script>
</body>
</html>
