<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIDJON GAMES | 100% WORKING</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --bg-color: #050505;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background: linear-gradient(135deg, #111, #222);
            padding: 30px 10px;
            border-bottom: 3px solid var(--neon-blue);
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.3);
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .game-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px 10px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-card:hover {
            border-color: var(--neon-pink);
            transform: translateY(-10px);
            box-shadow: 0 0 20px var(--neon-pink);
            background: #252525;
        }

        .icon {
            font-size: 45px;
            margin-bottom: 10px;
        }

        .title {
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .footer {
            margin: 40px 0;
            padding: 20px;
        }

        .tg-btn {
            background: transparent;
            color: var(--neon-pink);
            border: 2px solid var(--neon-pink);
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            transition: 0.3s;
        }

        .tg-btn:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 20px var(--neon-pink);
        }
    </style>
</head>
<body>

<header>
    <h1>SAIDJON GAME PORTAL</h1>
    <p style="color: #888;">Tanlang va darhol o'ynang!</p>
</header>

<div class="container" id="gameGrid">
    </div>

<div class="footer">
    <a href="https://t.me/saidjon_mc1" class="tg-btn">ADMINGA MUROJAT</a>
</div>

<script>
    // 100% ishlaydigan va ochiq o'yinlar ro'yxati
    const gameList = [
        { name: "Minecraft", icon: "⛏️", url: "https://classic.minecraft.net/" },
        { name: "Slither.io", icon: "🐍", url: "http://slither.io/" },
        { name: "Paper.io", icon: "📄", url: "https://paper-io.com/" },
        { name: "2048", icon: "🔢", url: "https://play2048.co/" },
        { name: "Pac-Man", icon: "🍕", url: "https://www.google.com/logos/2010/pacman10-i.html" },
        { name: "Tetris", icon: "🧱", url: "https://tetris.com/play-tetris" },
        { name: "Flappy Bird", icon: "🐦", url: "https://flappybird.io/" },
        { name: "Subway Surfers", icon: "🏃", url: "https://poki.com/en/g/subway-surfers" },
        { name: "Temple Run 2", icon: "🗿", url: "https://poki.com/en/g/temple-run-2" },
        { name: "Moto X3M", icon: "🏍️", url: "https://poki.com/en/g/moto-x3m" },
        { name: "Dino Run", icon: "🦖", url: "https://chromedino.com/" },
        { name: "Helix Jump", icon: "🌀", url: "https://poki.com/en/g/helix-jump" },
        { name: "Among Us", icon: "🚀", url: "https://poki.com/en/g/among-us-single-player" },
        { name: "Chess", icon: "♟️", url: "https://www.chess.com/play/online" },
        { name: "Bottle Flip", icon: "🍾", url: "https://poki.com/en/g/impossible-13" }
    ];

    // Ro'yxatni 50 tagacha to'ldirish (Poki platformasi orqali)
    for(let i = 16; i <= 50; i++) {
        gameList.push({
            name: "Top Game " + i,
            icon: "🎮",
            url: "https://poki.com/"
        });
    }

    const grid = document.getElementById('gameGrid');

    gameList.forEach(game => {
        const card = document.createElement('a');
        card.className = 'game-card';
        card.href = game.url;
        card.target = "_blank"; // Yangi sahifada ochish - 100% ishlash garovi
        card.innerHTML = `
            <div class="icon">${game.icon}</div>
            <div class="title">${game.name}</div>
        `;
        grid.appendChild(card);
    });
</script>

</body>
</html>
